<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>推し録</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>📱 推し録</h1>
    <p>自分だけの推し活記録アプリ</p>
  </header>

  <main>
    <div class="card">
      <h2>今年の参戦</h2>
      <p class="number">0 回</p>
    </div>

    <div class="card">
      <h2>総チェキ枚数</h2>
      <p class="number">0 枚</p>
    </div>

    <div class="card">
      <h2>次のライブ</h2>
      <p>まだ登録されていません</p>
    </div>
  </main>

  <nav>
    <button>🏠</button>
    <button>➕</button>
    <button>📖</button>
    <button>📊</button>
  </nav>

  <script src="script.js"></script>
</body>
</html>
