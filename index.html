<!DOCTYPE html>
<html lang="ja">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">

    <title>推し録</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<header class="header">

    <div>

        <h1>💖 推し録</h1>

        <p>思い出は、積み重ねるもの。</p>

    </div>

    <img
        class="profile"
        src="https://placehold.co/80x80/png"
        alt="profile">

</header>


<main id="home-screen">

    <section class="hero">

        <p class="small">

            次のイベントまで

        </p>

        <h2 id="countdown">

            あと11日

        </h2>

    </section>



    <section class="event-card">

        <div>

            <p class="label">

                NEXT EVENT

            </p>

            <h2 id="event-name">

                夏染

            </h2>

            <p id="group-name">

                MAGICAL SPEC

            </p>

            <p id="event-date">

                2026.07.20

            </p>

            <p id="event-place">

                幕張公園

            </p>

        </div>

        <button>

            📅

        </button>

    </section>



    <section class="stats">

        <div class="stat">

            <p>

                今年の参戦

            </p>

            <h2 id="live-count">

                18

            </h2>

        </div>

        <div class="stat">

            <p>

                チェキ

            </p>

            <h2 id="cheki-count">

                152

            </h2>

        </div>

    </section>



    <section class="today">

        <h3>

            🌸 去年の今日

        </h3>

        <div class="memory-card">

            <h4>

                浴衣公演

            </h4>

            <p>

                AIKAと夏祭りトーク😊

            </p>

        </div>

    </section>



    <section>

        <h3>

            📖 最近の思い出

        </h3>

        <div id="recent-list">

        </div>

    </section>

</main>



<nav>

    <button>🏠</button>

    <button>📅</button>

    <button class="main-button">＋</button>

    <button>📖</button>

    <button>👤</button>

</nav>

<script src="script.js"></script>

</body>
</html>
